name: Build Unity Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      # 释放磁盘：ubuntu-latest 默认可用磁盘偏小，而 Unity Android 构建镜像
      # （含 NDK/LLVM 工具链）解压需 ~15GB，偶发 "no space left on device"。
      # 移除 Unity 容器用不到的预装工具（宿主 Android SDK/.NET/Haskell/大包/
      # 交换分区），腾出 20-30GB，构建稳定不再因磁盘失败。
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          lfs: true

      # 缓存 Library：避免每次全量重新导入工程，后续构建可提速数倍
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-Android-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android

      - name: Upload APK or AAB
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: build
